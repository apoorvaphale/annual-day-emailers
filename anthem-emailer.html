<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Mic Check, Teams! The Team Anthem Challenge has begun</title>
    <style type="text/css">
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
        img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; display: block; }
        body { margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #0a0a0a; }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#0a0a0a;">
    <!-- Preheader (hidden preview text in inbox list) -->
    <div style="display:none; font-size:1px; color:#0a0a0a; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
        The Team Anthem Challenge has begun &mdash; start preparing your 1-minute video anthem. Submission deadline: 15th May.
    </div>

    <!-- Outer wrapper -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0a0a0a;">
        <tr>
            <td align="center" style="padding: 24px 12px;">

                <!-- Email container (600px wide, standard) -->
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; background-color:#0a0a0a;">

                    <!-- Hero image with clickable image map -->
                    <tr>
                        <td align="center" style="padding:0; line-height:0; font-size:0;">
                            <!--
                                IMAGE MAP NOTES
                                ---------------
                                The <img> below is displayed at width=600. The <map> coordinates
                                are calibrated for a 600px-wide rendering of an image whose
                                natural aspect ratio is roughly 1131 x 1424.

                                If your image's natural dimensions differ, recalc the four corners
                                of each <area> in the form: coords="x1,y1,x2,y2" where the units
                                are pixels measured on the 600px-wide display.

                                Two clickable hot-spots are defined:
                                  1. "Check Your Team"     -> Google Sheet (teams list)
                                  2. "Get Submission Link" -> Google Form (submission)
                            -->
                            <img src="anthem.png"
                                 width="600"
                                 alt="Mic Check, Teams! The Team Anthem Challenge has begun. Submission deadline: 15th May."
                                 usemap="#anthemMap"
                                 style="display:block; width:600px; max-width:600px; height:auto; border:0; outline:none;" />

                            <map name="anthemMap">
                                <!-- LEFT BUTTON: Check Your Team -->
                                <area shape="rect"
                                      coords="34,627,286,683"
                                      href="https://docs.google.com/spreadsheets/d/12KZfZF8ujhiYxae8GgRcM5kEYxonM1wEJcH8UmX_gPI/edit?usp=sharing"
                                      alt="Check Your Team"
                                      title="Check Your Team"
                                      target="_blank"
                                      rel="noopener noreferrer" />
                                <!-- RIGHT BUTTON: Get Submission Link -->
                                <area shape="rect"
                                      coords="312,627,566,683"
                                      href="https://forms.gle/A2A562XRpdiLfVeJ8"
                                      alt="Get Submission Link"
                                      title="Get Submission Link"
                                      target="_blank"
                                      rel="noopener noreferrer" />
                            </map>
                        </td>
                    </tr>

                </table>
                <!-- /Email container -->

            </td>
        </tr>
    </table>
</body>
</html>
